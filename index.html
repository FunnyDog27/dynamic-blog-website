<!DOCTYPE html>
<html>
<head>
  <title>My Blog</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>My Blog Website</h1>

  <a href="index.html">Home</a>
  <a href="new-post.html">Create New Post</a>

  <h2>All Blog Posts</h2>

  <div id="posts"></div>

  <script>
    let postsDiv = document.getElementById("posts");

    let posts = JSON.parse(localStorage.getItem("blogPosts")) || [];

    if (posts.length == 0) {
      postsDiv.innerHTML = "<p>No posts yet</p>";
    } else {
      for (let i = 0; i < posts.length; i++) {
        let post = posts[i];

        postsDiv.innerHTML += `
          <div class="card">
            <h3>${post.title}</h3>
            <p>${post.content}</p>
            <a href="post.html?id=${i}">View Post</a>
          </div>
        `;
      }
    }
  </script>

</body>
</html>
