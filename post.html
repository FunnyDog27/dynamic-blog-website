<!DOCTYPE html>
<html>
<head>
  <title>View Post</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>View Post</h1>

  <a href="index.html">Home</a>
  <a href="new-post.html">Create New Post</a>

  <div id="postArea"></div>

  <script>
    let postArea = document.getElementById("postArea");

    let params = new URLSearchParams(window.location.search);
    let id = params.get("id");

    let posts = JSON.parse(localStorage.getItem("blogPosts")) || [];

    if (id == null || posts[id] == undefined) {
      postArea.innerHTML = "<p>Post not found</p>";
    } else {
      showPost();
    }

    function showPost() {
      let post = posts[id];

      postArea.innerHTML = `
        <h2>${post.title}</h2>
        ${post.image ? `<img src="${post.image}" width="300">` : ""}
        <p>${post.content}</p>

        <button onclick="editPost()">Edit</button>
        <button onclick="deletePost()">Delete</button>
      `;
    }

    function editPost() {
      let post = posts[id];

      postArea.innerHTML = `
        <p>Edit Title:</p>
        <input type="text" id="editTitle" value="${post.title}">

        <p>Edit Content:</p>
        <textarea id="editContent">${post.content}</textarea>

        <br><br>
        <button onclick="savePost()">Save Changes</button>
      `;
    }

    function savePost() {
      let newTitle = document.getElementById("editTitle").value;
      let newContent = document.getElementById("editContent").value;

      if (newTitle == "" || newContent == "") {
        alert("Title and content cannot be empty");
        return;
      }

      posts[id].title = newTitle;
      posts[id].content = newContent;

      localStorage.setItem("blogPosts", JSON.stringify(posts));

      alert("Post updated");
      showPost();
    }

    function deletePost() {
      let answer = confirm("Are you sure you want to delete this post?");

      if (answer) {
        posts.splice(id, 1);
        localStorage.setItem("blogPosts", JSON.stringify(posts));
        window.location.href = "index.html";
      }
    }
  </script>

</body>
</html>
